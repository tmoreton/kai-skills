id: email
name: email
description: Send and read emails — SMTP/IMAP support for all providers
author: kai

dependencies:
  - name: nodemailer
    version: "^6.9.0"
    optional: true
    description: "Required for SMTP email sending. Install with: npm install nodemailer"

config_schema:
  - key: SMTP_HOST
    type: string
    description: SMTP server hostname (e.g. smtp.gmail.com)
  - key: SMTP_PORT
    type: number
    description: SMTP server port (465 for SSL, 587 for TLS)
    default: 587
  - key: SMTP_USER
    type: string
    description: SMTP username / email address
  - key: SMTP_PASS
    type: string
    description: SMTP password or app password
  - key: SMTP_SECURE
    type: boolean
    description: Use SSL/TLS (true for port 465, false for STARTTLS on 587)
    default: false
  - key: IMAP_HOST
    type: string
    description: IMAP server hostname for reading email (e.g. imap.gmail.com)
  - key: IMAP_PORT
    type: number
    description: IMAP server port (993 for SSL)
    default: 993
  - key: IMAP_USER
    type: string
    description: IMAP username (defaults to SMTP_USER if not set)
  - key: IMAP_PASS
    type: string
    description: IMAP password (defaults to SMTP_PASS if not set)
tools:
  - name: setup
    description: Set up email SMTP credentials
    parameters:
      smtp_host:
        type: string
        required: true
        description: SMTP server host (e.g., smtp.gmail.com)
      smtp_port:
        type: number
        required: false
        default: 587
        description: SMTP port
      username:
        type: string
        required: true
        description: Email username
      password:
        type: string
        required: true
        description: Email password or app-specific password
  - name: send
    description: Send an email to one or more recipients. Supports plain text and HTML bodies, CC, BCC, and reply-to.
    parameters:
      to:
        type: string
        required: true
        description: Recipient email address(es), comma-separated for multiple
      subject:
        type: string
        required: true
        description: Email subject line
      body:
        type: string
        required: true
        description: Email body (plain text)
      html:
        type: string
        description: HTML email body (optional, sent alongside plain text)
      cc:
        type: string
        description: CC recipients, comma-separated
      bcc:
        type: string
        description: BCC recipients, comma-separated
      reply_to:
        type: string
        description: Reply-To address
      from_name:
        type: string
        description: Display name for the sender (optional)
  - name: read
    description: Read recent emails from the inbox via IMAP. Returns subject, from, date, and a text preview of each message.
    parameters:
      folder:
        type: string
        description: "Mailbox folder to read from (default: INBOX)"
      limit:
        type: number
        description: "Number of recent emails to fetch (default: 10, max: 50)"
      unseen_only:
        type: boolean
        description: "Only fetch unread/unseen emails (default: false)"
  - name: search
    description: Search emails by criteria (from, subject, date range, etc.) via IMAP.
    parameters:
      from:
        type: string
        description: Filter by sender address or name
      subject:
        type: string
        description: Filter by subject line (substring match)
      since:
        type: string
        description: "Emails since this date (format: YYYY-MM-DD)"
      before:
        type: string
        description: "Emails before this date (format: YYYY-MM-DD)"
      unseen_only:
        type: boolean
        description: Only return unread emails
      limit:
        type: number
        description: "Max results to return (default: 10)"
  - name: verify
    description: Test the SMTP connection to verify credentials are working
    parameters: {}
