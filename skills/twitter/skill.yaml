id: twitter
name: Twitter/X
version: 2.1.0
description: Twitter/X API v2 — real Twitter API for search, user analysis, and posting
author: Kai
tags: ["social-media", "twitter", "x", "analytics", "posting"]
config_schema:
  - key: api_key
    type: string
    required: true
    env: X_API_KEY
    description: Twitter API Key (Consumer Key from developer.x.com)
  - key: api_secret
    type: string
    required: true
    env: X_API_SECRET
    description: Twitter API Secret (Consumer Secret)
  - key: access_token
    type: string
    required: true
    env: X_ACCESS_TOKEN
    description: Twitter Access Token
  - key: access_token_secret
    type: string
    required: true
    env: X_ACCESS_TOKEN_SECRET
    description: Twitter Access Token Secret
tools:
  - name: search_tweets
    description: Search recent tweets using Twitter API v2 (requires Basic tier or higher for full search)
    parameters:
      query:
        type: string
        required: true
        description: Search query (keywords, hashtags, etc.)
      max_results:
        type: number
        description: Maximum results (default 20, max 100)
  - name: get_user_tweets
    description: Get recent tweets from a specific user
    parameters:
      username:
        type: string
        required: true
        description: Twitter/X username (with or without @)
      max_results:
        type: number
        description: Maximum tweets (default 20, max 100)
  - name: analyze_user
    description: Analyze a Twitter user's profile, follower count, and metrics
    parameters:
      username:
        type: string
        required: true
        description: Twitter/X username
  - name: post_tweet
    description: "Post a tweet to Twitter/X (Free tier: 500/month)"
    parameters:
      text:
        type: string
        required: true
        description: Tweet text (max 280 characters)
  - name: get_rate_limits
    description: Check API credentials and tier info
    parameters: {}
