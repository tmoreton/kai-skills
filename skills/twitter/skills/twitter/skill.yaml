id: twitter
name: Twitter/X
version: 2.2.0
description: Twitter/X management — post tweets, threads, analyze engagement, search, track followers. API v2 with OAuth 1.0a.
author: Kai
tags: ["social-media", "twitter", "x", "analytics", "posting", "tweets"]
config_schema:
  - key: api_key
    type: string
    required: true
    env: X_API_KEY
    description: Twitter/X API Key (Consumer Key from developer.x.com)
  - key: api_secret
    type: string
    required: true
    env: X_API_SECRET
    description: Twitter/X API Secret (Consumer Secret)
  - key: access_token
    type: string
    required: true
    env: X_ACCESS_TOKEN
    description: Twitter/X Access Token
  - key: access_token_secret
    type: string
    required: true
    env: X_ACCESS_TOKEN_SECRET
    description: Twitter/X Access Token Secret
tools:
  - name: search_tweets
    description: "Search, find tweets on Twitter/X by keywords, hashtags, mentions. Discover trending topics, monitor brand mentions, research conversations. Use for social listening, trend analysis, competitive research, content discovery."
    parameters:
      query:
        type: string
        required: true
        description: Search query (keywords, hashtags, etc.)
      max_results:
        type: number
        description: Maximum results (default 20, max 100)
  - name: get_user_tweets
    description: Get recent tweets from a specific user
    parameters:
      username:
        type: string
        required: true
        description: Twitter/X username (with or without @)
      max_results:
        type: number
        description: Maximum tweets (default 20, max 100)
  - name: analyze_user
    description: Analyze a Twitter user's profile, follower count, and metrics
    parameters:
      username:
        type: string
        required: true
        description: Twitter/X username
  - name: post_tweet
    description: "Post a tweet to Twitter/X (Free tier: 500/month)"
    parameters:
      text:
        type: string
        required: true
        description: Tweet text (max 280 characters)
  - name: get_rate_limits
    description: Check API credentials and tier info
    parameters: {}
