id: webhook
name: Webhook
version: 1.0.0
description: Webhook automation — send HTTP requests to Zapier, Slack, Discord. POST JSON with auth and retries.
author: Kai
tags: ["webhook", "automation", "zapier", "make", "api", "integration", "notifications"]
config_schema: []  # No required configuration - all params passed per-action
dependencies:
  # No npm dependencies - uses native fetch
tools:
  - name: setup
    description: Configure webhook defaults and signing secrets. Set global webhook settings, authentication tokens for verification. Optional setup before sending webhooks.
    parameters:
      secret:
        type: string
        required: false
        description: Webhook signing secret for verification

  - name: send_webhook
    description: "Send, dispatch, trigger webhooks via HTTP POST. Send JSON payloads to Zapier, Make, Slack, custom APIs. Use for automation triggers, notifications, app integrations, event forwarding. Supports custom headers and auth."
    parameters:
      url:
        type: string
        required: true
        description: Webhook URL to send the request to
      payload:
        type: object
        description: JSON payload to send (default empty object)
      headers:
        type: object
        description: Additional HTTP headers to include

  - name: send_with_auth
    description: Send a POST request with Bearer token or API key authentication
    parameters:
      url:
        type: string
        required: true
        description: Webhook URL to send the request to
      auth_type:
        type: string
        required: true
        description: Authentication type
        enum: [bearer, api_key]
      auth_token:
        type: string
        description: Bearer token (use this or api_key)
      api_key:
        type: string
        description: API key (alternative to auth_token, sent as X-API-Key header)
      payload:
        type: object
        description: JSON payload to send (default empty object)
      headers:
        type: object
        description: Additional HTTP headers to include

  - name: test_endpoint
    description: Test connectivity to an endpoint with GET or other HTTP method
    parameters:
      url:
        type: string
        required: true
        description: URL to test
      method:
        type: string
        description: HTTP method to use (default GET)
        enum: [GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS]
      headers:
        type: object
        description: Additional HTTP headers to include
      timeout:
        type: number
        description: Request timeout in milliseconds (default 10000)
