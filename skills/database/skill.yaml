id: database
name: database
description: Database operations including migrations, queries, and connection management
version: 1.0.0
author: Kai

dependencies:
  - name: glob
    version: "^10.0.0"
    optional: true
    description: Required for file pattern matching in migrations. Usually already installed.

tools:
  - name: db_migrate_run
    description: Run database migrations with auto-detection of framework
    parameters:
      framework:
        type: string
        description: Migration framework to use
        enum: [auto, prisma, typeorm, sequelize, knex, alembic, flyway]
        default: auto
      direction:
        type: string
        description: Migration direction
        enum: [up, down, latest]
        default: latest
      count:
        type: number
        description: Number of migrations to run (for down)
      dry_run:
        type: boolean
        description: Preview migrations without applying
        default: false
    required: []

  - name: db_migrate_status
    description: Show migration status and pending migrations
    parameters:
      framework:
        type: string
        description: Migration framework to use
        enum: [auto, prisma, typeorm, sequelize, knex, alembic]
        default: auto
    required: []

  - name: db_query
    description: Execute SQL query with result formatting
    parameters:
      query:
        type: string
        description: SQL query to execute
        required: true
      connection:
        type: string
        description: Database connection string (or use env var)
      format:
        type: string
        description: Output format
        enum: [table, json, csv]
        default: table
      max_rows:
        type: number
        description: Maximum rows to return
        default: 100
    required: [query]

  - name: db_schema_inspect
    description: Inspect database schema and generate types/docs
    parameters:
      tables:
        type: array
        description: Specific tables to inspect (all if empty)
      format:
        type: string
        description: Output format
        enum: [markdown, json, typescript, prisma]
        default: markdown
      include_data:
        type: boolean
        description: Include sample data
        default: false
    required: []

  - name: db_backup
    description: Create database backup
    parameters:
      format:
        type: string
        description: Backup format
        enum: [sql, json, csv]
        default: sql
      tables:
        type: array
        description: Specific tables to backup (all if empty)
      compress:
        type: boolean
        description: Compress backup file
        default: true
    required: []

  - name: db_seed
    description: Seed database with test data
    parameters:
      environment:
        type: string
        description: Environment to seed
        enum: [development, test, staging]
        default: development
      reset:
        type: boolean
        description: Reset data before seeding
        default: false
    required: []
