id: google-sheets
name: google-sheets
version: 1.0.0
description: Google Sheets — create spreadsheets, export data, share reports
author: Kai
tags: ["google", "sheets", "spreadsheets", "data", "export", "reports"]
config_schema:
  # Service Account Authentication (Recommended for server-side)
  - key: service_account_json
    type: string
    required: false
    env: GOOGLE_SERVICE_ACCOUNT_JSON
    description: Service account JSON key (full JSON content as string). Get from Google Cloud Console > IAM & Admin > Service Accounts > Create Key.

  # OAuth 2.0 Authentication (User-level access)
  - key: client_id
    type: string
    required: false
    env: GOOGLE_CLIENT_ID
    description: OAuth 2.0 Client ID from Google Cloud Console

  - key: client_secret
    type: string
    required: false
    env: GOOGLE_CLIENT_SECRET
    description: OAuth 2.0 Client Secret

  - key: refresh_token
    type: string
    required: false
    env: GOOGLE_REFRESH_TOKEN
    description: OAuth 2.0 Refresh Token (obtained after user consent flow)

  - key: access_token
    type: string
    required: false
    env: GOOGLE_ACCESS_TOKEN
    description: OAuth 2.0 Access Token (short-lived, refresh_token preferred)

  - key: redirect_uri
    type: string
    required: false
    env: GOOGLE_REDIRECT_URI
    description: "OAuth redirect URI (default: http://localhost)"

  # Sheet-specific options
  - key: default_spreadsheet_id
    type: string
    required: false
    description: Default spreadsheet ID to use when not specified in actions

dependencies:
  - googleapis
tools:
  - name: setup
    description: Set up Google Sheets credentials via OAuth or Service Account
    parameters:
      client_id:
        type: string
        required: false
        description: OAuth 2.0 Client ID (if using OAuth)
      client_secret:
        type: string
        required: false
        description: OAuth 2.0 Client Secret (if using OAuth)
      refresh_token:
        type: string
        required: false
        description: OAuth 2.0 Refresh Token (if using OAuth)
      service_account_json:
        type: string
        required: false
        description: Service Account JSON key content (alternative to OAuth)

  - name: create_spreadsheet
    description: Create a new Google Spreadsheet with optional sheets
    parameters:
      title:
        type: string
        required: true
        description: Title of the new spreadsheet
      sheets:
        type: array
        required: false
        description: "Array of sheet objects with 'title' property (default: one sheet named 'Sheet1')"

  - name: append_rows
    description: Append rows of data to a spreadsheet
    parameters:
      spreadsheet_id:
        type: string
        required: true
        description: Spreadsheet ID or full URL
      sheet:
        type: string
        required: false
        default: Sheet1
        description: Sheet name to append to
      values:
        type: array
        required: true
        description: "Array of arrays (rows) to append. Example: [[Name, Age], [John, 30]]"
      range:
        type: string
        required: false
        description: Specific range to append to (e.g., "A1:C10"). If not provided, appends after existing data.
      value_input_option:
        type: string
        required: false
        default: RAW
        enum: [RAW, USER_ENTERED]
        description: How to interpret input values
      insert_option:
        type: string
        required: false
        default: INSERT_ROWS
        enum: [INSERT_ROWS, OVERWRITE]
        description: Whether to insert new rows or overwrite existing

  - name: update_cell
    description: Update a specific cell or range with a value
    parameters:
      spreadsheet_id:
        type: string
        required: true
        description: Spreadsheet ID or full URL
      sheet:
        type: string
        required: false
        default: Sheet1
        description: Sheet name
      cell:
        type: string
        required: true
        description: Cell reference (e.g., "A1", "B2") or range (e.g., "A1:C3")
      value:
        type: string
        required: true
        description: Value to write to the cell
      value_input_option:
        type: string
        required: false
        default: RAW
        enum: [RAW, USER_ENTERED]
        description: How to interpret input values

  - name: get_values
    description: Read values from a spreadsheet range
    parameters:
      spreadsheet_id:
        type: string
        required: true
        description: Spreadsheet ID or full URL
      sheet:
        type: string
        required: false
        default: Sheet1
        description: Sheet name
      range:
        type: string
        required: false
        description: Cell range to read (e.g., "A1:D10"). If not provided, reads entire sheet.
      major_dimension:
        type: string
        required: false
        default: ROWS
        enum: [ROWS, COLUMNS]
        description: Whether values are returned as rows or columns
      value_render_option:
        type: string
        required: false
        default: FORMATTED_VALUE
        enum: [FORMATTED_VALUE, UNFORMATTED_VALUE, FORMULA]
        description: How values should be rendered
      date_time_render_option:
        type: string
        required: false
        default: SERIAL_NUMBER
        enum: [SERIAL_NUMBER, FORMATTED_STRING]
        description: How dates should be rendered

  - name: share_spreadsheet
    description: Share a spreadsheet with users or make it public
    parameters:
      spreadsheet_id:
        type: string
        required: true
        description: Spreadsheet ID or full URL
      email:
        type: string
        required: false
        description: Email address to share with (required for type=user)
      role:
        type: string
        required: false
        default: reader
        enum: [reader, commenter, writer, owner]
        description: Permission level
      type:
        type: string
        required: false
        default: user
        enum: [user, group, domain, anyone]
        description: Type of permission grant
      domain:
        type: string
        required: false
        description: Domain name (required when type=domain)
      send_notification:
        type: boolean
        required: false
        default: true
        description: Whether to send email notification
      email_message:
        type: string
        required: false
        description: Custom message to include in notification email
