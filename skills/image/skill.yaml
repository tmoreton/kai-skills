id: image
name: Image
description: AI-powered image and thumbnail generation using OpenRouter API
version: 1.0.0
author: Kai
icon: https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/1f5bc.svg
tags: ["image", "thumbnail", "generation", "ai", "graphics"]
config_schema:
  OPENROUTER_API_KEY:
    type: string
    required: true
    env: OPENROUTER_API_KEY
    description: OpenRouter API key for image generation (get at openrouter.ai/keys)
dependencies:
  - name: openai
    version: ^4.0.0
    required: true
    description: OpenAI client for API calls
tools:
  - name: generate_thumbnail
    description: Generate a professional thumbnail for YouTube/video content
    parameters:
      prompt:
        type: string
        required: true
        description: Description of what the thumbnail should show
      title:
        type: string
        required: false
        description: Video title to incorporate into thumbnail concept
      description:
        type: string
        required: false
        description: Video description for context
      style:
        type: string
        required: false
        default: professional, eye-catching, YouTube thumbnail
        description: Style guide for the thumbnail
      width:
        type: number
        required: false
        default: 1280
        description: Image width in pixels
      height:
        type: number
        required: false
        default: 720
        description: Image height in pixels
      model:
        type: string
        required: false
        default: google/gemma-3-27b-it
        description: AI model to use for generation
      output_dir:
        type: string
        required: false
        description: Custom output directory for the image

  - name: generate_image
    description: Generate custom images with AI
    parameters:
      prompt:
        type: string
        required: true
        description: Image description/prompt
      width:
        type: number
        required: false
        default: 1024
        description: Image width in pixels
      height:
        type: number
        required: false
        default: 1024
        description: Image height in pixels
      model:
        type: string
        required: false
        default: google/gemma-3-27b-it
        description: AI model to use
      n:
        type: number
        required: false
        default: 1
        description: Number of images to generate
      output_dir:
        type: string
        required: false
        description: Custom output directory

  - name: list_models
    description: List available image generation models
    parameters: {}

  - name: get_image_info
    description: Get metadata about a generated image file
    parameters:
      path:
        type: string
        required: true
        description: Path to the image file
