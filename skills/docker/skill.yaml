id: docker
name: docker
description: Docker container management, compose operations, and image building
version: 1.0.0
author: Kai
tags: ["docker", "containers", "devops", "deployment"]

tools:
  - name: docker_build
    description: Build Docker image with intelligent tagging
    parameters:
      tag:
        type: string
        description: Image tag (auto-generated if not provided)
      dockerfile:
        type: string
        description: Path to Dockerfile (default 'Dockerfile')
        default: Dockerfile
      context:
        type: string
        description: Build context path (default '.')
        default: .
      push:
        type: boolean
        description: Push to registry after build
        default: false
      no_cache:
        type: boolean
        description: Build without cache
        default: false

  - name: docker_run
    description: Run Docker container with smart defaults
    parameters:
      image:
        type: string
        description: Image name to run
        required: true
      name:
        type: string
        description: Container name (auto-generated if not provided)
      ports:
        type: array
        description: Port mappings (e.g., ['3000:3000'])
      env:
        type: object
        description: Environment variables
      volumes:
        type: array
        description: Volume mounts
      detach:
        type: boolean
        description: Run in background
        default: true
      remove:
        type: boolean
        description: Remove container on stop (--rm)
        default: false

  - name: docker_compose_up
    description: Start services with docker-compose
    parameters:
      services:
        type: array
        description: Specific services to start
      build:
        type: boolean
        description: Build images before starting
        default: false
      detach:
        type: boolean
        description: Run in background
        default: true
      file:
        type: string
        description: Compose file path (default 'docker-compose.yml')

  - name: docker_compose_down
    description: Stop and remove docker-compose services
    parameters:
      volumes:
        type: boolean
        description: Remove volumes as well
        default: false
      file:
        type: string
        description: Compose file path

  - name: docker_logs
    description: View container logs with filtering
    parameters:
      container:
        type: string
        description: Container name or ID
        required: true
      follow:
        type: boolean
        description: Follow log output
        default: false
      tail:
        type: number
        description: Number of lines to show
        default: 100
      since:
        type: string
        description: Show logs since timestamp

  - name: docker_status
    description: Show running containers and resource usage
    parameters:
      all:
        type: boolean
        description: Show all containers including stopped
        default: false
      format:
        type: string
        description: Output format
        enum: [table, json]
        default: table
