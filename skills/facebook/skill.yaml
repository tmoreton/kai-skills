id: facebook
name: Facebook
version: 1.0.0
description: Facebook Pages — page info, posts, insights, publishing
author: Kai
tags: ["social-media", "facebook", "pages", "publishing"]
config_schema:
  - key: access_token
    type: string
    required: true
    env: FACEBOOK_ACCESS_TOKEN
    description: Facebook Page Access Token (from developers.facebook.com/tools/explorer/)
  - key: page_id
    type: string
    required: true
    env: FACEBOOK_PAGE_ID
    description: Facebook Page ID (found in Page Settings > Page Info)
tools:
  - name: setup
    description: Set up Facebook API credentials
    parameters:
      access_token:
        type: string
        required: true
        description: Facebook Graph API access token
      page_id:
        type: string
        required: false
        description: Default Facebook Page ID to use
  - name: get_page_info
    description: Get Facebook page details including name, followers, category, verification status, and contact info
    parameters:
      fields:
        type: string
        description: Comma-separated fields to retrieve (default includes name, fan_count, category, etc.)
  - name: get_page_posts
    description: Get recent posts from the Facebook page with engagement metrics
    parameters:
      limit:
        type: number
        description: Maximum number of posts to fetch (default 10)
      fields:
        type: string
        description: Fields to include for each post (default includes message, likes, comments, shares)
  - name: get_page_insights
    description: Get page analytics and insights (impressions, reach, engagement, new fans)
    parameters:
      metrics:
        type: string
        description: Comma-separated insight metrics (default includes page_impressions, page_engaged_users, page_fans)
      period:
        type: string
        description: Time period for metrics
        enum: [day, week, days_28]
      since:
        type: string
        description: Start date in YYYY-MM-DD format
      until:
        type: string
        description: End date in YYYY-MM-DD format
  - name: post_to_page
    description: Post content (text and/or link) to the Facebook page
    parameters:
      message:
        type: string
        description: Post text content
      text:
        type: string
        description: Alias for message
      link:
        type: string
        description: URL to share in the post
      url:
        type: string
        description: Alias for link
      published:
        type: boolean
        description: Whether to publish immediately (false to schedule)
      scheduled_publish_time:
        type: string
        description: Unix timestamp for scheduled posts (requires published=false)
