id: youtube
name: YouTube
description: YouTube management — upload videos, channel analytics, comments, engagement tracking. Creator tools and SEO.
version: 1.0.0
author: Kai
tags: ["social-media", "youtube", "analytics", "video", "content-creation", "upload"]

config_schema:
  - key: YOUTUBE_API_KEY
    type: string
    description: YouTube Data API v3 key from Google Cloud Console
    required: true

tools:
  - name: setup
    description: Configure, authenticate YouTube API credentials. Set up YouTube Data API access for uploading videos, reading analytics, managing channel. Required before using any YouTube features.
    parameters:
      api_key:
        type: string
        required: true
        description: YouTube Data API v3 key from Google Cloud Console

  - name: search_videos
    description: Search YouTube for videos by query
    parameters:
      query:
        type: string
        required: true
        description: Search query
      max_results:
        type: number
        description: Maximum results (default 10)
        default: 10
      order:
        type: string
        description: Sort order
        enum: [relevance, date, viewCount]
        default: relevance
      channel_id:
        type: string
        description: Filter by channel ID
      published_after:
        type: string
        description: ISO date to filter videos published after (e.g., 2024-01-01)

  - name: get_video_stats
    description: Get statistics (views, likes, comments) for YouTube videos
    parameters:
      video_ids:
        type: string
        required: true
        description: Comma-separated video IDs

  - name: get_channel
    description: Get YouTube channel info (subscribers, views, video count)
    parameters:
      channel_id:
        type: string
        required: true
        description: YouTube channel ID

  - name: get_recent_uploads
    description: Get a channel's latest uploaded videos with stats
    parameters:
      channel_id:
        type: string
        required: true
        description: YouTube channel ID
      max_results:
        type: number
        description: Maximum results (default 10)
        default: 10

  - name: get_trending
    description: Get trending YouTube videos by region
    parameters:
      region:
        type: string
        description: Region code (default US)
        default: US
      category_id:
        type: string
        description: Video category ID
      max_results:
        type: number
        description: Maximum results (default 10)
        default: 10

  - name: get_comments
    description: Get comments for a video with engagement metrics
    parameters:
      video_id:
        type: string
        required: true
        description: Video ID to fetch comments from
      max_results:
        type: number
        description: Number of comments to return (max 100)
        default: 20

  - name: compare_videos
    description: Compare performance metrics across multiple videos
    parameters:
      video_ids:
        type: string
        required: true
        description: Comma-separated video IDs to compare

  - name: generate_channel_report
    description: Generate a comprehensive analytics report for a channel
    parameters:
      channel_id:
        type: string
        required: true
        description: YouTube channel ID
      days:
        type: number
        description: Number of days to analyze (default 30)
        default: 30
