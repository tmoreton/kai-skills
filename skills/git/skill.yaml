id: git
name: git
description: Advanced Git operations including smart commits, branch management, and PR workflows
version: 1.0.0
author: Kai
tags: ["version-control", "git", "github"]

tools:
  - name: git_smart_commit
    description: AI-powered git commit with automatic message generation and optional push
    parameters:
      message:
        type: string
        description: Optional commit message (auto-generated if not provided)
      scope:
        type: string
        description: Commit scope (e.g., 'api', 'ui', 'docs')
      push:
        type: boolean
        description: Push after commit
        default: false
      dry_run:
        type: boolean
        description: Preview what would be committed without doing it
        default: false

  - name: git_pr_create
    description: Full PR workflow - creates branch, commits changes, pushes, and opens PR
    parameters:
      title:
        type: string
        description: PR title
        required: true
      body:
        type: string
        description: PR description/body
      base:
        type: string
        description: Base branch to merge into (default from env or 'main')
        default: main
      branch_name:
        type: string
        description: Branch name (auto-generated if not provided)
      draft:
        type: boolean
        description: Create as draft PR
        default: false

  - name: git_log_summary
    description: Summarize recent git history with AI-generated changelog
    parameters:
      since:
        type: string
        description: Show commits since date (e.g., '2024-01-01', '1 week ago')
        default: "1 week ago"
      max_entries:
        type: number
        description: Maximum commits to analyze
        default: 50
      format:
        type: string
        description: Output format
        enum: [changelog, summary, list]
        default: summary

  - name: git_branch_suggest
    description: Suggest branch name based on context (current changes or description)
    parameters:
      context:
        type: string
        description: Brief description of the work being done (e.g., "add user auth", "fix login bug")
      prefix:
        type: string
        description: Branch prefix (feature/, fix/, hotfix/, etc.)
        default: feature/
      max_length:
        type: number
        description: Maximum branch name length
        default: 50

  - name: git_status_detailed
    description: Detailed git status with analysis of changes
    parameters:
      analyze:
        type: boolean
        description: Include analysis of what the changes are doing
        default: true
