id: web-tools
name: web-tools
version: 1.0.0
description: Web utilities — fetch pages, search with Tavily
author: kai
config_schema:
  - key: tavily_api_key
    type: string
    env: TAVILY_API_KEY
    required: false
    description: Tavily API key for web search (optional - fetch tool works without it)
tools:
  - name: fetch
    description: Fetch content from a URL and return the response
    parameters:
      url:
        type: string
        required: true
        description: URL to fetch
      method:
        type: string
        description: HTTP method (default GET)
  - name: search
    description: Search the web using Tavily
    parameters:
      query:
        type: string
        required: true
        description: Search query
      max_results:
        type: number
        description: Maximum results (default 5)
